{% extends "base.html" %}
{% block title %} — Monitor de Evolución {{ alias }}{% endblock %}

{% block content %}
<style>
:root {
  --up-bg: #f0fdf4; --up-border: #86efac; --up-text: #15803d;
  --dn-bg: #fef2f2; --dn-border: #fca5a5; --dn-text: #b91c1c;
  --flat-bg: #f8fafc; --flat-border: #e2e8f0; --flat-text: #475569;
}

.monitor-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.5rem;
}
.monitor-header h2 { margin: 0; font-size: 1.35rem; font-weight: 700; }
.monitor-subtitle { color: #64748b; font-size: .85rem; margin-top: .2rem; }

.item-card {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
  margin-bottom: 1.25rem; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.item-card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: .85rem 1.2rem; background: #f8fafc;
  border-bottom: 1px solid #e2e8f0;
}
.item-card-header .item-name {
  font-weight: 600; font-size: .95rem; color: #1e293b;
}
.item-card-header .item-meta {
  font-size: .75rem; color: #64748b; margin-top: .15rem;
}
.item-card-body { padding: 1.2rem; }

.titulo-compare {
  display: grid; grid-template-columns: 1fr 1fr; gap: .75rem;
  margin-bottom: 1.25rem;
}
.titulo-box {
  padding: .7rem .9rem; border-radius: 8px; font-size: .82rem;
  line-height: 1.45;
}
.titulo-box.antes { background: #fef2f2; border: 1px solid #fca5a5; }
.titulo-box.despues { background: #f0fdf4; border: 1px solid #86efac; }
.titulo-box .titulo-label {
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; margin-bottom: .35rem; color: #64748b;
}
.titulo-box.antes .titulo-label { color: #b91c1c; }
.titulo-box.despues .titulo-label { color: #15803d; }

.metrics-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: .75rem;
  margin-bottom: 1.1rem;
}
@media (max-width: 900px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }

.metric-box {
  padding: .75rem; border-radius: 8px; text-align: center;
  border: 1px solid #e2e8f0; background: #f8fafc;
}
.metric-box.up    { background: var(--up-bg);   border-color: var(--up-border); }
.metric-box.down  { background: var(--dn-bg);   border-color: var(--dn-border); }
.metric-box.flat  { background: var(--flat-bg); border-color: var(--flat-border); }
.metric-label { font-size: .68rem; color: #64748b; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .3rem; }
.metric-before { font-size: .78rem; color: #94a3b8; margin-bottom: .1rem; }
.metric-after  { font-size: 1.2rem; font-weight: 700; color: #1e293b; }
.metric-box.up .metric-after   { color: var(--up-text); }
.metric-box.down .metric-after { color: var(--dn-text); }
.metric-delta {
  font-size: .72rem; font-weight: 600; margin-top: .2rem; padding: .1rem .4rem;
  border-radius: 10px; display: inline-block;
}
.metric-box.up .metric-delta   { background: #dcfce7; color: var(--up-text); }
.metric-box.down .metric-delta { background: #fee2e2; color: var(--dn-text); }
.metric-box.flat .metric-delta { background: #e2e8f0; color: var(--flat-text); }

.no-data-msg { color: #94a3b8; font-size: .82rem; font-style: italic; }

.card-actions { display: flex; gap: .6rem; justify-content: flex-end; }
.btn-refresh {
  font-size: .78rem; padding: .35rem .85rem; border-radius: 6px;
  border: 1px solid #3b82f6; color: #3b82f6; background: transparent;
  cursor: pointer; transition: all .15s;
}
.btn-refresh:hover { background: #3b82f6; color: #fff; }
.btn-refresh:disabled { opacity: .5; cursor: not-allowed; }
.btn-delete {
  font-size: .78rem; padding: .35rem .85rem; border-radius: 6px;
  border: 1px solid #ef4444; color: #ef4444; background: transparent;
  cursor: pointer; transition: all .15s;
}
.btn-delete:hover { background: #ef4444; color: #fff; }

.badge-applied {
  font-size: .65rem; padding: .15rem .5rem; border-radius: 10px;
  background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe;
  margin-left: .3rem; font-weight: 600;
}
.days-badge {
  font-size: .7rem; padding: .15rem .55rem; border-radius: 10px;
  background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1;
}
.empty-state {
  text-align: center; padding: 4rem 2rem; color: #94a3b8;
}
.empty-state i { font-size: 3rem; margin-bottom: 1rem; display: block; }
.empty-state p { font-size: .95rem; }

.spinner { display: inline-block; width: 14px; height: 14px;
  border: 2px solid #ddd; border-top-color: #3b82f6;
  border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.snapshot-info { font-size: .72rem; color: #94a3b8; margin-top: .5rem; text-align: right; }

.timeline-toggle {
  font-size: .72rem; color: #3b82f6; cursor: pointer; border: none; background: none;
  padding: .25rem 0; display: flex; align-items: center; gap: .3rem; margin-top: .5rem;
}
.timeline-toggle:hover { text-decoration: underline; }
.timeline-table {
  width: 100%; border-collapse: collapse; font-size: .73rem; margin-top: .5rem;
}
.timeline-table th {
  font-size: .65rem; font-weight: 700; color: #94a3b8; text-transform: uppercase;
  letter-spacing: .04em; padding: .35rem .5rem; border-bottom: 1px solid #e2e8f0;
  text-align: left;
}
.timeline-table td {
  padding: .35rem .5rem; border-bottom: 1px solid #f1f5f9; color: #334155;
}
.timeline-table tr.baseline-row td { background: #eff6ff; font-weight: 600; }
.timeline-pos-up   { color: #15803d; font-weight: 700; }
.timeline-pos-down { color: #dc2626; font-weight: 700; }
.timeline-pos-flat { color: #64748b; }

/* ── Sprint 3.1 — vista expandible de baseline completo ── */
.capturing-banner {
  background: #eff6ff; border: 1px solid #bfdbfe; color: #1d4ed8;
  padding: .65rem .9rem; border-radius: 8px; margin-bottom: .75rem;
  font-size: .82rem; display: flex; align-items: center; gap: .5rem;
}
.capturing-banner .pulse {
  width: 10px; height: 10px; border-radius: 50%; background: #3b82f6;
  animation: pulse 1.4s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: .4; transform: scale(.9); }
  50%      { opacity: 1; transform: scale(1.1); }
}

.expand-toggle {
  font-size: .76rem; color: #3b82f6; cursor: pointer; border: none;
  background: none; padding: .35rem 0; display: inline-flex;
  align-items: center; gap: .3rem; margin-top: .3rem;
}
.expand-toggle:hover { text-decoration: underline; }

.detail-sections { margin-top: .75rem; display: none; }
.detail-sections.open { display: block; }

.detail-section {
  border: 1px solid #e2e8f0; border-radius: 8px;
  padding: .75rem .95rem; margin-bottom: .65rem; background: #fafafa;
}
.detail-section-title {
  font-size: .68rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: .05em; color: #475569; margin-bottom: .55rem;
  display: flex; align-items: center; gap: .4rem;
}
.detail-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: .55rem .8rem;
}
.detail-cell {
  display: flex; flex-direction: column; gap: 1px;
  padding: .35rem .55rem; background: #fff; border-radius: 6px;
  border: 1px solid #f1f5f9;
}
.detail-cell .lbl { font-size: .62rem; font-weight: 600; color: #94a3b8;
                     text-transform: uppercase; letter-spacing: .03em; }
.detail-cell .val { font-size: .88rem; font-weight: 700; color: #0f172a; }
.detail-cell.unavailable .val { color: #cbd5e1; font-style: italic; font-weight: 500; }
.detail-cell.unavailable .lbl { color: #cbd5e1; }

.kw-list { font-size: .77rem; line-height: 1.55; }
.kw-list .kw-item { display: flex; justify-content: space-between;
                     padding: .15rem .4rem; border-radius: 4px; }
.kw-list .kw-item:nth-child(even) { background: rgba(241, 245, 249, .6); }

.capture-meta { font-size: .66rem; color: #94a3b8; margin-top: .55rem;
                 padding-top: .55rem; border-top: 1px dashed #e2e8f0; }

.alerta-banner {
  display: flex; align-items: flex-start; gap: .6rem;
  padding: .65rem .9rem; border-radius: 8px; margin-bottom: .75rem;
  font-size: .82rem; line-height: 1.45;
}
.alerta-banner.warning { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }
.alerta-banner.bueno   { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
.alerta-banner.neutro  { background: #f8fafc; border: 1px solid #e2e8f0; color: #475569; }
.alerta-banner .alerta-icon { font-size: 1rem; flex-shrink: 0; margin-top: .05rem; }
.alerta-fecha { font-size: .68rem; color: #94a3b8; margin-top: .2rem; }
</style>

<div class="monitor-header">
  <div>
    <h2><i class="bi bi-activity" style="color:#3b82f6"></i> Monitor de Evolución</h2>
    <div class="monitor-subtitle">Seguimiento del impacto real de cada optimización aplicada</div>
  </div>
</div>

<div id="monitor-container">
  <div class="empty-state">
    <span class="spinner"></span>
    <p style="margin-top:1rem;color:#94a3b8">Cargando...</p>
  </div>
</div>

<script>
const ALIAS = {{ alias | tojson }};

function deltaClass(val, lowerIsBetter) {
  if (val === null || val === undefined) return 'flat';
  if (lowerIsBetter) return val < 0 ? 'up' : val > 0 ? 'down' : 'flat';
  return val > 0 ? 'up' : val < 0 ? 'down' : 'flat';
}

function fmtDelta(val, suffix, lowerIsBetter) {
  if (val === null || val === undefined) return '—';
  const sign = val > 0 ? '+' : '';
  const arrow = lowerIsBetter
    ? (val < 0 ? '↑ ' : val > 0 ? '↓ ' : '')
    : (val > 0 ? '↑ ' : val < 0 ? '↓ ' : '');
  return arrow + sign + val + (suffix || '');
}

function metricBox(label, baseline, latest, delta, deltaPct, lowerIsBetter, unit) {
  const cls      = deltaClass(delta, lowerIsBetter);
  const bVal     = baseline !== null && baseline !== undefined ? baseline + (unit||'') : '—';
  const aVal     = latest   !== null && latest   !== undefined ? latest   + (unit||'') : '—';
  const dLabel   = deltaPct !== null && deltaPct !== undefined
    ? fmtDelta(deltaPct, '%', lowerIsBetter)
    : fmtDelta(delta, unit||'', lowerIsBetter);

  return `<div class="metric-box ${cls}">
    <div class="metric-label">${label}</div>
    <div class="metric-before">Antes: ${bVal}</div>
    <div class="metric-after">${latest !== null && latest !== undefined ? aVal : '<span class="no-data-msg">sin datos</span>'}</div>
    ${delta !== null ? `<div class="metric-delta">${dLabel}</div>` : ''}
  </div>`;
}

const ALERTA_ICONS = {warning: '⚠', bueno: '✓', neutro: '—'};

function renderAlertas(alertas) {
  if (!alertas || !alertas.length) return '';
  return alertas.map(a => `
    <div class="alerta-banner ${a.nivel}">
      <span class="alerta-icon">${ALERTA_ICONS[a.nivel] || '•'}</span>
      <div>
        <div>${a.mensaje}</div>
        <div class="alerta-fecha">${a.fecha || ''}</div>
      </div>
    </div>`).join('');
}

function renderTimeline(it) {
  const snaps   = it.snapshots || [];
  const b       = it.baseline  || {};
  const basePOS = b.posicion;
  const baseVIS = b.visitas_7d;
  const baseDate = (b.fecha || it.fecha_opt || '').slice(0, 10);

  let rows = `<tr class="baseline-row">
    <td>📌 ${baseDate}</td>
    <td>${basePOS !== null && basePOS !== undefined ? '#' + basePOS : '—'}</td>
    <td>${baseVIS !== null && baseVIS !== undefined ? baseVIS : '—'}</td>
    <td><span style="font-size:.65rem;background:#dbeafe;color:#1d4ed8;padding:1px 6px;border-radius:8px;font-weight:700">BASELINE</span></td>
  </tr>`;

  snaps.forEach(s => {
    const pos = s.posicion;
    const vis = s.visitas_7d;
    const fecha = (s.fecha || '').slice(0, 10);
    let posCell = pos !== null && pos !== undefined ? '#' + pos : '—';
    let posCls  = 'timeline-pos-flat';
    let deltaTxt = '';
    if (basePOS !== null && basePOS !== undefined && pos !== null && pos !== undefined) {
      const d = pos - basePOS;
      if (d < 0) { posCls = 'timeline-pos-up';   deltaTxt = ` <span style="font-size:.65rem">(${d})</span>`; }
      if (d > 0) { posCls = 'timeline-pos-down';  deltaTxt = ` <span style="font-size:.65rem">(+${d})</span>`; }
    }
    let visDelta = '';
    if (baseVIS !== null && baseVIS !== undefined && vis !== null && vis !== undefined) {
      const dv = vis - baseVIS;
      const sign = dv > 0 ? '+' : '';
      const col  = dv > 0 ? '#15803d' : dv < 0 ? '#dc2626' : '#64748b';
      visDelta = ` <span style="font-size:.65rem;color:${col}">(${sign}${dv})</span>`;
    }
    rows += `<tr>
      <td>${fecha}</td>
      <td class="${posCls}">${posCell}${deltaTxt}</td>
      <td>${vis !== null && vis !== undefined ? vis : '—'}${visDelta}</td>
      <td style="color:#94a3b8;font-size:.68rem">${s.ventas_total !== undefined ? s.ventas_total + ' vtas' : ''}</td>
    </tr>`;
  });

  const tbl = `<table class="timeline-table">
    <thead><tr>
      <th>Fecha</th><th>Posición</th><th>Visitas 7d</th><th>Ventas</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;

  const id = 'tl-' + it.item_id.replace(/[^a-z0-9]/gi, '_');
  return `<button class="timeline-toggle" onclick="(function(b,t){b.innerHTML=(t.style.display==='none'?(t.style.display='',b.innerHTML.replace('▶','▼')):(t.style.display='none',b.innerHTML.replace('▼','▶')))})(this,document.getElementById('${id}'))">
    <i class="bi bi-clock-history"></i> ▶ Ver línea de tiempo (${snaps.length} actualización${snaps.length !== 1 ? 'es' : ''})
  </button>
  <div id="${id}" style="display:none">${tbl}</div>`;
}

function renderItem(it) {
  const b  = it.baseline       || {};
  const u  = it.ultimo_snapshot || {};
  const d  = it.deltas         || {};
  const hasSnapshot = it.snapshots_n > 0;
  const alertas = (it.alertas || []).filter(a => a.nivel !== 'neutro' || true);

  // Alertas
  const alertasBlock = renderAlertas(alertas);

  // Título compare
  let tituloBlock = '';
  if (it.origen === 'nueva') {
    // Publicación nueva creada con toda la optimización aplicada
    const origLink = it.item_id_original
      ? ` <span style="font-size:.72rem;color:#6b7280">(reemplaza a ${it.item_id_original})</span>` : '';
    tituloBlock = `<div class="titulo-compare">
      <div class="titulo-box despues" style="flex:1">
        <div class="titulo-label">🆕 Nueva publicación — optimización completa aplicada${origLink}</div>
        ${it.titulo_despues || it.titulo_producto}
      </div>
    </div>`;
  } else if (it.titulo_antes || it.titulo_despues) {
    const mismosT = it.titulo_antes && it.titulo_despues && it.titulo_antes.trim() === it.titulo_despues.trim();
    if (mismosT) {
      tituloBlock = `<div class="titulo-compare">
        <div class="titulo-box antes" style="flex:1">
          <div class="titulo-label">📌 Título (sin cambio — publicación con ventas)</div>
          ${it.titulo_antes}
        </div>
      </div>`;
    } else {
      tituloBlock = `<div class="titulo-compare">
        <div class="titulo-box antes">
          <div class="titulo-label">✗ Título anterior</div>
          ${it.titulo_antes || '<em>no registrado</em>'}
        </div>
        <div class="titulo-box despues">
          <div class="titulo-label">✓ Título aplicado</div>
          ${it.titulo_despues || '<em>sin cambio de título</em>'}
        </div>
      </div>`;
    }
  }

  // Métricas — siempre mostrar baseline; comparar con último snapshot si hay
  const hasBaseline = b.visitas_7d !== undefined || b.ventas_30d !== undefined || b.ventas_total !== undefined || b.posicion !== undefined;
  let metricsBlock = '';
  if (hasBaseline) {
    const snapInfo = hasSnapshot
      ? '<div class="snapshot-info">Última actualización: ' + (u.fecha || '—') + ' · ' + it.snapshots_n + ' snapshot' + (it.snapshots_n !== 1 ? 's' : '') + '</div>'
      : '<div class="no-data-msg" style="margin-top:.5rem;margin-bottom:.25rem">Métricas de línea base capturadas · Actualizá en unos días para ver la evolución.</div>';

    // Bloque visitas ayer (solo si hay datos del último snapshot)
    const ayer = it.visitas_ayer;
    const diarioBlock = (ayer !== null && ayer !== undefined) ? `
    <div style="display:flex;gap:.75rem;margin-bottom:.75rem;align-items:center;flex-wrap:wrap">
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.45rem .9rem;display:flex;align-items:center;gap:.5rem">
        <i class="bi bi-calendar-day" style="color:#64748b;font-size:.85rem"></i>
        <span style="font-size:.75rem;color:#64748b;font-weight:600">Visitas ayer</span>
        <span style="font-size:1.15rem;font-weight:800;color:${ayer === 0 ? '#dc2626' : '#1e293b'}">${ayer}</span>
        ${ayer === 0 ? '<span style="font-size:.65rem;color:#dc2626;font-weight:600">⚠ sin tráfico ayer</span>' : ''}
      </div>
      <div style="font-size:.68rem;color:#94a3b8">
        <i class="bi bi-info-circle me-1"></i>Actualizá para refrescar
      </div>
    </div>` : '';

    metricsBlock = `
    ${diarioBlock}
    <div class="metrics-grid">
      ${metricBox('Visitas 7d',       b.visitas_7d,    hasSnapshot ? u.visitas_7d    : undefined, hasSnapshot ? d.visitas_7d    : null, hasSnapshot ? d.visitas_pct  : null, false, '')}
      ${metricBox('Ventas 30d',       b.ventas_30d,    hasSnapshot ? u.ventas_30d    : undefined, hasSnapshot ? d.ventas_30d    : null, hasSnapshot ? d.ventas_pct   : null, false, '')}
      ${metricBox('Ventas acumuladas',b.ventas_total,  hasSnapshot ? u.ventas_total  : undefined, hasSnapshot ? d.ventas_total  : null, null,                                false, '')}
      ${metricBox('Conversión',       b.conv_pct,      hasSnapshot ? u.conv_pct      : undefined, hasSnapshot ? d.conv_pct      : null, null,                                false, '%')}
      ${metricBox('Posición',         b.posicion,      hasSnapshot ? u.posicion      : undefined, hasSnapshot ? d.posicion      : null, null,                                true,  '°')}
    </div>
    ${snapInfo}`;
  } else {
    metricsBlock = `<div class="no-data-msg" style="margin-bottom:.75rem">
      Sin datos de seguimiento aún — actualizá las métricas para ver la evolución.
    </div>`;
  }

  // Badges de qué se aplicó
  const appliedBadges = (it.applied || []).map(a =>
    `<span class="badge-applied">${a}</span>`).join('');

  // Capturing placeholder — se muestra mientras corre la captura async
  let capturingBlock = '';
  if (it._capturing) {
    capturingBlock = `<div class="capturing-banner">
      <span class="pulse"></span>
      <span><strong>Capturando baseline completo…</strong> recargá en 10-15 segundos para ver las 14 métricas.</span>
    </div>`;
  } else if (it._capture_error) {
    capturingBlock = `<div class="alerta-banner warning" style="font-size:.78rem">
      <span class="alerta-icon">⚠</span>
      <span>Error capturando baseline: ${it._capture_error}</span>
    </div>`;
  }

  // Vista expandible con las 5 secciones nuevas (solo si baseline tiene v2)
  const detailBlock = renderDetalleExpansible(it);

  return `<div class="item-card" id="card-${it.item_id}">
    <div class="item-card-header">
      <div>
        <div class="item-name">${it.titulo_producto}</div>
        <div class="item-meta">
          ${it.item_id}
          ${appliedBadges}
          <span class="days-badge" style="margin-left:.5rem">
            Optimizado hace ${it.dias_elapsed} día${it.dias_elapsed !== 1 ? 's' : ''}
          </span>
          <span style="color:#94a3b8;font-size:.72rem;margin-left:.5rem">${it.fecha_opt}</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-refresh" onclick="refreshItem('${it.item_id}', this)">
          <i class="bi bi-arrow-clockwise"></i> Actualizar
        </button>
        <button class="btn-delete" onclick="deleteItem('${it.item_id}', '${it.titulo_producto.replace(/'/g, "\\'")}')">
          <i class="bi bi-trash3"></i> Eliminar
        </button>
      </div>
    </div>
    <div class="item-card-body">
      ${capturingBlock}
      ${alertasBlock}
      ${tituloBlock}
      ${metricsBlock}
      ${detailBlock}
      ${it.snapshots_n > 0 ? renderTimeline(it) : ''}
    </div>
  </div>`;
}

// ── Sprint 3.1 — render de secciones expandibles del baseline v2 ─────────────
function fmtVal(v, suffix = '') {
  if (v === null || v === undefined || v === '') return null;
  if (typeof v === 'boolean') return v ? '✓ Sí' : '✗ No';
  if (typeof v === 'number')  return Number.isInteger(v) ? v.toLocaleString('es-AR') + suffix : v.toLocaleString('es-AR', {maximumFractionDigits: 2}) + suffix;
  return String(v) + suffix;
}

function detailCell(label, value, suffix = '') {
  const fmt = fmtVal(value, suffix);
  if (fmt === null) {
    return `<div class="detail-cell unavailable">
      <div class="lbl">${label}</div>
      <div class="val">no disponible</div>
    </div>`;
  }
  return `<div class="detail-cell">
    <div class="lbl">${label}</div>
    <div class="val">${fmt}</div>
  </div>`;
}

function renderDetalleExpansible(it) {
  const b = it.baseline || {};
  const ver = it.baseline_version || b.version || 1;
  // Si el baseline NO es v2, mostrar nota y badge "parcial" (parte del commit 4)
  if (ver < 2) return '';

  const vis = b.visibilidad || {};
  const traf = b.trafico || {};
  const ven = b.ventas || {};
  const eng = b.engagement || {};
  const sal = b.salud || {};
  const meta = b._capture_metrics || {};

  // Lista de top keywords
  const kwsHtml = (vis.posicion_top_keywords || []).map(k => `
    <div class="kw-item">
      <span style="color:#475569">${k.kw}</span>
      <span style="font-weight:700;color:${k.posicion ? '#0f172a' : '#cbd5e1'}">
        ${k.posicion ? '#' + k.posicion : 'no rankea'}
      </span>
    </div>
  `).join('') || '<div class="text-muted" style="font-size:.72rem">— no disponible —</div>';

  const id = `detail-${it.item_id.replace(/[^a-z0-9]/gi, '_')}`;
  const captureMeta = meta.duration_ms
    ? `<div class="capture-meta">
        Captura: ${(meta.duration_ms/1000).toFixed(1)}s · ${meta.ml_api_calls_count || 0} llamadas a ML API
        ${meta.duration_breakdown
          ? ' · ' + Object.entries(meta.duration_breakdown).map(([k,v]) => `${k}: ${(v/1000).toFixed(1)}s`).join(' · ')
          : ''}
      </div>`
    : '';

  return `<button class="expand-toggle" onclick="toggleDetail('${id}', this)">
    <i class="bi bi-chevron-right"></i> Ver todas las métricas del baseline
  </button>
  <div id="${id}" class="detail-sections">
    <div class="detail-section">
      <div class="detail-section-title"><i class="bi bi-eye-fill" style="color:#7c3aed"></i>Visibilidad</div>
      <div class="detail-grid">
        ${detailCell('Score Calidad ML', vis.score_calidad_ml, '/100')}
        ${detailCell('Nivel calidad', vis.score_calidad_nivel)}
        ${detailCell('En catálogo', vis.esta_en_catalogo)}
        ${detailCell('Tiene Buy Box', vis.tiene_buy_box)}
      </div>
      <div style="margin-top:.6rem">
        <div class="lbl" style="font-size:.62rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.03em;margin-bottom:.3rem">Posición top keywords</div>
        <div class="kw-list">${kwsHtml}</div>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title"><i class="bi bi-bar-chart-fill" style="color:#3b82f6"></i>Tráfico</div>
      <div class="detail-grid">
        ${detailCell('Visitas 7d', traf.visitas_7d)}
        ${detailCell('Visitas 30d', traf.visitas_30d)}
        ${detailCell('Conversión 7d', traf.conversion_7d, '%')}
        ${detailCell('Conversión 30d', traf.conversion_30d, '%')}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title"><i class="bi bi-cart-fill" style="color:#16a34a"></i>Ventas</div>
      <div class="detail-grid">
        ${detailCell('Unidades 7d', ven.unidades_7d)}
        ${detailCell('Unidades 30d', ven.unidades_30d)}
        ${detailCell('Facturación 7d', ven.facturacion_7d ? '$' + ven.facturacion_7d.toLocaleString('es-AR') : null)}
        ${detailCell('Facturación 30d', ven.facturacion_30d ? '$' + ven.facturacion_30d.toLocaleString('es-AR') : null)}
        ${detailCell('Ticket promedio', ven.ticket_promedio ? '$' + ven.ticket_promedio.toLocaleString('es-AR') : null)}
        ${detailCell('Ventas histórico', ven.ventas_total_historica)}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title"><i class="bi bi-chat-dots-fill" style="color:#d97706"></i>Engagement</div>
      <div class="detail-grid">
        ${detailCell('Preguntas pendientes', eng.preguntas_pendientes)}
        ${detailCell('Preguntas 30d', eng.preguntas_total_30d)}
        ${detailCell('Reseñas', eng.resenas_cantidad)}
        ${detailCell('Promedio estrellas', eng.resenas_promedio_estrellas, ' ★')}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title"><i class="bi bi-shield-check" style="color:#dc2626"></i>Salud</div>
      <div class="detail-grid">
        ${detailCell('Reclamos 30d', sal.reclamos_30d)}
        ${detailCell('Cancelaciones 30d', sal.cancelaciones_30d)}
        ${detailCell('Mediaciones 30d', sal.mediaciones_30d)}
      </div>
    </div>
    ${captureMeta}
  </div>`;
}

function toggleDetail(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.classList.toggle('open');
  btn.innerHTML = open
    ? '<i class="bi bi-chevron-down"></i> Ocultar métricas detalladas'
    : '<i class="bi bi-chevron-right"></i> Ver todas las métricas del baseline';
}

async function loadMonitor() {
  try {
    const r = await fetch(`/api/monitor-evolucion/${encodeURIComponent(ALIAS)}`);
    const data = await r.json();
    const container = document.getElementById('monitor-container');
    if (!data.ok || !data.items.length) {
      container.innerHTML = `<div class="empty-state">
        <i class="bi bi-activity"></i>
        <p>No hay publicaciones en el monitor todavía.</p>
        <p style="font-size:.82rem;margin-top:.5rem">
          Cuando apliques una optimización desde <strong>Optimizar IA</strong>,
          la publicación aparecerá aquí automáticamente.
        </p>
      </div>`;
      return;
    }
    container.innerHTML = data.items.map(renderItem).join('');
  } catch(e) {
    document.getElementById('monitor-container').innerHTML =
      `<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Error al cargar: ${e.message}</p></div>`;
  }
}

async function refreshItem(itemId, btn) {
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Actualizando...';
  try {
    const r = await fetch('/api/monitor-refresh', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({alias: ALIAS, item_id: itemId})
    });
    const data = await r.json();
    if (data.ok) {
      await loadMonitor();
    } else {
      alert('Error: ' + (data.error || 'desconocido'));
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Actualizar';
    }
  } catch(e) {
    alert('Error: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Actualizar';
  }
}

async function deleteItem(itemId, nombre) {
  if (!confirm(`¿Eliminar "${nombre}" del monitor?\n\nEsto no afecta la publicación en ML.`)) return;
  try {
    const r = await fetch('/api/monitor-delete', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({alias: ALIAS, item_id: itemId})
    });
    const data = await r.json();
    if (data.ok) {
      const card = document.getElementById(`card-${itemId}`);
      if (card) card.remove();
      const remaining = document.querySelectorAll('.item-card');
      if (!remaining.length) loadMonitor();
    }
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

loadMonitor().then(() => {
  fetch('/api/monitor-marcar-leidas', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({alias: ALIAS})
  }).then(() => {
    const key = ALIAS.replace(/\s+/g,'_');
    const mb = document.getElementById(`monitor-badge-${key}`);
    if (mb) mb.style.display = 'none';
  }).catch(() => {});
});
</script>
{% endblock %}
