{% extends "base.html" %}
{% block title %} — Monitor de Evolución {{ alias }}{% endblock %}

{% block content %}
<style>
:root {
  --up-bg: #f0fdf4; --up-border: #86efac; --up-text: var(--color-success-700);
  --dn-bg: #fef2f2; --dn-border: #fca5a5; --dn-text: #b91c1c;
  --flat-bg: var(--color-neutral-50); --flat-border: var(--color-neutral-200); --flat-text: #475569;
}

.monitor-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.5rem;
}
.monitor-header h2 { margin: 0; font-size: 1.35rem; font-weight: 700; }
.monitor-subtitle { color: var(--color-neutral-600); font-size: .85rem; margin-top: .2rem; }

.item-card {
  background: var(--color-neutral-0); border: 1px solid var(--color-neutral-200); border-radius: 12px;
  margin-bottom: 1.25rem; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.item-card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: .85rem 1.2rem; background: var(--color-neutral-50);
  border-bottom: 1px solid var(--color-neutral-200);
}
.item-card-header .item-name {
  font-weight: 600; font-size: .95rem; color: var(--color-neutral-800);
}
.item-card-header .item-meta {
  font-size: .75rem; color: var(--color-neutral-600); margin-top: .15rem;
}
.item-card-body { padding: 1.2rem; }

.titulo-compare {
  display: grid; grid-template-columns: 1fr 1fr; gap: .75rem;
  margin-bottom: 1.25rem;
}
.titulo-box {
  padding: .7rem .9rem; border-radius: 8px; font-size: .82rem;
  line-height: 1.45;
}
.titulo-box.antes { background: #fef2f2; border: 1px solid #fca5a5; }
.titulo-box.despues { background: #f0fdf4; border: 1px solid #86efac; }
.titulo-box .titulo-label {
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; margin-bottom: .35rem; color: var(--color-neutral-600);
}
.titulo-box.antes .titulo-label { color: #b91c1c; }
.titulo-box.despues .titulo-label { color: var(--color-success-700); }

.metrics-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: .75rem;
  margin-bottom: 1.1rem;
}
@media (max-width: 900px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }

.metric-box {
  padding: .75rem; border-radius: 8px; text-align: center;
  border: 1px solid var(--color-neutral-200); background: var(--color-neutral-50);
}
.metric-box.up    { background: var(--up-bg);   border-color: var(--up-border); }
.metric-box.down  { background: var(--dn-bg);   border-color: var(--dn-border); }
.metric-box.flat  { background: var(--flat-bg); border-color: var(--flat-border); }
.metric-label { font-size: .68rem; color: var(--color-neutral-600); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .3rem; }
.metric-before { font-size: .78rem; color: var(--color-neutral-400); margin-bottom: .1rem; }
.metric-after  { font-size: 1.2rem; font-weight: 700; color: var(--color-neutral-800); }
.metric-box.up .metric-after   { color: var(--up-text); }
.metric-box.down .metric-after { color: var(--dn-text); }
.metric-delta {
  font-size: .72rem; font-weight: 600; margin-top: .2rem; padding: .1rem .4rem;
  border-radius: 10px; display: inline-block;
}
.metric-box.up .metric-delta   { background: var(--color-success-100); color: var(--up-text); }
.metric-box.down .metric-delta { background: var(--color-critical-100); color: var(--dn-text); }
.metric-box.flat .metric-delta { background: var(--color-neutral-200); color: var(--flat-text); }

.no-data-msg { color: var(--color-neutral-400); font-size: .82rem; font-style: italic; }

.card-actions { display: flex; gap: .6rem; justify-content: flex-end; }
.btn-refresh {
  font-size: .78rem; padding: .35rem .85rem; border-radius: 6px;
  border: 1px solid var(--color-info-500); color: var(--color-info-500); background: transparent;
  cursor: pointer; transition: all .15s;
}
.btn-refresh:hover { background: var(--color-info-500); color: var(--color-neutral-0); }
.btn-refresh:disabled { opacity: .5; cursor: not-allowed; }
.btn-delete {
  font-size: .78rem; padding: .35rem .85rem; border-radius: 6px;
  border: 1px solid var(--color-critical-400); color: var(--color-critical-400); background: transparent;
  cursor: pointer; transition: all .15s;
}
.btn-delete:hover { background: var(--color-critical-400); color: var(--color-neutral-0); }

.badge-applied {
  font-size: .65rem; padding: .15rem .5rem; border-radius: 10px;
  background: #eff6ff; color: var(--color-info-600); border: 1px solid #bfdbfe;
  margin-left: .3rem; font-weight: 600;
}
.days-badge {
  font-size: .7rem; padding: .15rem .55rem; border-radius: 10px;
  background: var(--color-neutral-100); color: #475569; border: 1px solid #cbd5e1;
}
.empty-state {
  text-align: center; padding: 4rem 2rem; color: var(--color-neutral-400);
}
.empty-state i { font-size: 3rem; margin-bottom: 1rem; display: block; }
.empty-state p { font-size: .95rem; }

.spinner { display: inline-block; width: 14px; height: 14px;
  border: 2px solid #ddd; border-top-color: var(--color-info-500);
  border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.snapshot-info { font-size: .72rem; color: var(--color-neutral-400); margin-top: .5rem; text-align: right; }

.timeline-toggle {
  font-size: .72rem; color: var(--color-info-500); cursor: pointer; border: none; background: none;
  padding: .25rem 0; display: flex; align-items: center; gap: .3rem; margin-top: .5rem;
}
.timeline-toggle:hover { text-decoration: underline; }
.timeline-table {
  width: 100%; border-collapse: collapse; font-size: .73rem; margin-top: .5rem;
}
.timeline-table th {
  font-size: .65rem; font-weight: 700; color: var(--color-neutral-400); text-transform: uppercase;
  letter-spacing: .04em; padding: .35rem .5rem; border-bottom: 1px solid var(--color-neutral-200);
  text-align: left;
}
.timeline-table td {
  padding: .35rem .5rem; border-bottom: 1px solid var(--color-neutral-100); color: #334155;
}
.timeline-table tr.baseline-row td { background: #eff6ff; font-weight: 600; }
.timeline-pos-up   { color: var(--color-success-700); font-weight: 700; }
.timeline-pos-down { color: var(--color-critical-500); font-weight: 700; }
.timeline-pos-flat { color: var(--color-neutral-600); }

/* ── Sprint 3.1 — vista expandible de baseline completo ── */
.capturing-banner {
  background: #eff6ff; border: 1px solid #bfdbfe; color: var(--color-info-700);
  padding: .65rem .9rem; border-radius: 8px; margin-bottom: .75rem;
  font-size: .82rem; display: flex; align-items: center; gap: .5rem;
}
.capturing-banner .pulse {
  width: 10px; height: 10px; border-radius: 50%; background: var(--color-info-500);
  animation: pulse 1.4s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: .4; transform: scale(.9); }
  50%      { opacity: 1; transform: scale(1.1); }
}

.expand-toggle {
  font-size: .76rem; color: var(--color-info-500); cursor: pointer; border: none;
  background: none; padding: .35rem 0; display: inline-flex;
  align-items: center; gap: .3rem; margin-top: .3rem;
}
.expand-toggle:hover { text-decoration: underline; }

.detail-sections { margin-top: .75rem; display: none; }
.detail-sections.open { display: block; }

.detail-section {
  border: 1px solid var(--color-neutral-200); border-radius: 8px;
  padding: .75rem .95rem; margin-bottom: .65rem; background: #fafafa;
}
.detail-section-title {
  font-size: .68rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: .05em; color: #475569; margin-bottom: .55rem;
  display: flex; align-items: center; gap: .4rem;
}
.detail-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: .55rem .8rem;
}
.detail-cell {
  display: flex; flex-direction: column; gap: 1px;
  padding: .35rem .55rem; background: var(--color-neutral-0); border-radius: 6px;
  border: 1px solid var(--color-neutral-100);
}
.detail-cell .lbl { font-size: .62rem; font-weight: 600; color: var(--color-neutral-400);
                     text-transform: uppercase; letter-spacing: .03em; }
.detail-cell .val { font-size: .88rem; font-weight: 700; color: #0f172a; }
.detail-cell.unavailable .val { color: #cbd5e1; font-style: italic; font-weight: 500; }
.detail-cell.unavailable .lbl { color: #cbd5e1; }

.kw-list { font-size: .77rem; line-height: 1.55; }
.kw-list .kw-item { display: flex; justify-content: space-between;
                     padding: .15rem .4rem; border-radius: 4px; }
.kw-list .kw-item:nth-child(even) { background: rgba(241, 245, 249, .6); }

.capture-meta { font-size: .66rem; color: var(--color-neutral-400); margin-top: .55rem;
                 padding-top: .55rem; border-top: 1px dashed var(--color-neutral-200); }

.badge-parcial {
  font-size: .62rem; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  background: var(--color-warning-100); color: #b45309; border: 1px solid #fde68a;
  margin-left: .3rem; cursor: help;
}
.recapture-banner {
  background: #fefce8; border: 1px solid #fde68a; color: var(--color-warning-700);
  padding: .65rem .9rem; border-radius: 8px; margin-top: .75rem;
  font-size: .8rem; display: flex; gap: .5rem; align-items: flex-start;
}
.recapture-banner .desc { flex: 1; line-height: 1.45; }
.btn-recapturar {
  background: var(--color-warning-500); color: var(--color-neutral-0); border: none; padding: .35rem .85rem;
  border-radius: 6px; font-size: .76rem; font-weight: 600; cursor: pointer;
  white-space: nowrap;
}
.btn-recapturar:hover { background: #b45309; }
.btn-recapturar:disabled { opacity: .5; cursor: not-allowed; }

.modal-warn {
  background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c;
  padding: .8rem; border-radius: 7px; font-size: .8rem;
  margin: .75rem 0; line-height: 1.5;
}

/* ── Sprint 3.1 ext republicación — info compacta de MLA-X ── */
.original-info {
  background: var(--color-neutral-50); border: 1px solid var(--color-neutral-200); border-radius: 8px;
  padding: .55rem .85rem; margin-top: .65rem;
  font-size: .77rem; display: flex; gap: .8rem; align-items: center;
  flex-wrap: wrap;
}
.original-info .label  { font-size: .62rem; font-weight: 700; text-transform: uppercase;
                          letter-spacing: .04em; color: var(--color-neutral-600); }
.original-info code    { background: var(--color-neutral-0); padding: 1px 6px; border-radius: 4px;
                          border: 1px solid var(--color-neutral-200); font-size: .75rem; }
.original-info .estado-pill {
  font-size: .65rem; font-weight: 700; padding: 1px 8px; border-radius: 10px;
}
.original-info .estado-pill.active  { background: var(--color-success-100); color: var(--color-success-700); }
.original-info .estado-pill.paused  { background: var(--color-warning-100); color: #b45309; }
.original-info .estado-pill.closed  { background: var(--color-critical-100); color: #b91c1c; }
.original-info .estado-pill.unknown { background: var(--color-neutral-100); color: var(--color-neutral-400); }
.original-info .retroactivo {
  font-size: .65rem; background: var(--color-warning-100); color: var(--color-warning-700);
  padding: 1px 7px; border-radius: 8px; cursor: help;
}
.btn-revincular {
  font-size: .7rem; padding: .25rem .65rem; border-radius: 6px;
  background: transparent; color: var(--color-warning-500); border: 1px solid #fde68a;
  cursor: pointer; margin-left: auto;
}
.btn-revincular:hover { background: var(--color-warning-100); }

.alerta-banner {
  display: flex; align-items: flex-start; gap: .6rem;
  padding: .65rem .9rem; border-radius: 8px; margin-bottom: .75rem;
  font-size: .82rem; line-height: 1.45;
}
.alerta-banner.warning { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }
.alerta-banner.bueno   { background: #f0fdf4; border: 1px solid #86efac; color: var(--color-success-700); }
.alerta-banner.neutro  { background: var(--color-neutral-50); border: 1px solid var(--color-neutral-200); color: #475569; }
.alerta-banner .alerta-icon { font-size: 1rem; flex-shrink: 0; margin-top: .05rem; }
.alerta-fecha { font-size: .68rem; color: var(--color-neutral-400); margin-top: .2rem; }

/* ── Sprint 3.2 — Banner del Veredicto IA ─────────────────────────────── */
.veredicto-banner {
  border-radius: 10px; padding: .9rem 1.1rem; margin-bottom: 1rem;
  border-left: 4px solid;
  display: flex; flex-direction: column; gap: .55rem;
}
.veredicto-banner--ganadora {
  background: var(--color-success-50, #f0fdf4);
  border-color:    var(--color-success-500, var(--color-success-500));
  color:           var(--color-success-700, var(--color-success-700));
}
.veredicto-banner--neutra {
  background: var(--color-warning-50, #fffbeb);
  border-color:    var(--color-warning-500, var(--color-warning-500));
  color:           var(--color-warning-700, var(--color-warning-700));
}
.veredicto-banner--perdedora {
  background: var(--color-critical-50, #fef2f2);
  border-color:    var(--color-critical-500, var(--color-critical-500));
  color:           var(--color-critical-700, var(--color-critical-700));
}
.veredicto-banner--info {
  background: #eff6ff; border-color: var(--color-info-500); color: var(--color-info-700);
}
.veredicto-header {
  display: flex; align-items: center; flex-wrap: wrap; gap: .55rem;
  font-size: .9rem; font-weight: 700;
}
.veredicto-header .score {
  font-weight: 600; opacity: .82; font-size: .8rem;
}
.veredicto-razon {
  font-size: .82rem; line-height: 1.5; color: #334155;
  margin: 0;
}
.veredicto-recomendacion {
  display: flex; flex-wrap: wrap; gap: .5rem; align-items: center;
  font-size: .8rem; color: #475569;
}
.veredicto-recomendacion strong { color: var(--color-neutral-800); }
.veredicto-meta {
  font-size: .68rem; color: var(--color-neutral-400);
  display: flex; gap: .8rem; flex-wrap: wrap;
}
.veredicto-actions {
  display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .25rem;
}
.veredicto-actions button {
  font-size: .76rem; padding: .35rem .85rem; border-radius: 6px;
  border: 1px solid currentColor; background: transparent;
  cursor: pointer; transition: all .15s; font-weight: 600;
}
.veredicto-actions button:hover:not(:disabled) {
  background: currentColor; color: var(--color-neutral-0);
}
.veredicto-actions button[data-action="cta-replicar"]:hover:not(:disabled),
.veredicto-actions button[data-action="cta-revertir"]:hover:not(:disabled),
.veredicto-actions button[data-action="cta-regenerar"]:hover:not(:disabled) {
  /* Override del color para que no se confunda con el texto del banner */
  background: var(--color-neutral-800); color: var(--color-neutral-0); border-color: var(--color-neutral-800);
}
.veredicto-actions button:disabled {
  opacity: .55; cursor: not-allowed; border-style: dashed;
}
.veredicto-alertas {
  font-size: .72rem; color: var(--color-warning-700); background: var(--color-warning-100);
  padding: .35rem .55rem; border-radius: 6px; margin-top: .2rem;
}
.veredicto-alertas ul { margin: 0; padding-left: 1rem; }

</style>

<div class="monitor-header">
  <div>
    <h2><i class="bi bi-activity" style="color:var(--color-info-500)"></i> Monitor de Evolución</h2>
    <div class="monitor-subtitle">Seguimiento del impacto real de cada optimización aplicada</div>
  </div>
</div>

<div id="monitor-container">
  <div class="empty-state">
    <span class="spinner"></span>
    <p style="margin-top:1rem;color:var(--color-neutral-400)">Cargando...</p>
  </div>
</div>

<script>
const ALIAS = {{ alias | tojson }};

// Helper para escapar valores que se usan como atributos HTML.
// Sin esto, títulos con comillas dobles rompen los data-attributes.
function escAttr(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function deltaClass(val, lowerIsBetter) {
  if (val === null || val === undefined) return 'flat';
  if (lowerIsBetter) return val < 0 ? 'up' : val > 0 ? 'down' : 'flat';
  return val > 0 ? 'up' : val < 0 ? 'down' : 'flat';
}

function fmtDelta(val, suffix, lowerIsBetter) {
  if (val === null || val === undefined) return '—';
  const sign = val > 0 ? '+' : '';
  const arrow = lowerIsBetter
    ? (val < 0 ? '↑ ' : val > 0 ? '↓ ' : '')
    : (val > 0 ? '↑ ' : val < 0 ? '↓ ' : '');
  return arrow + sign + val + (suffix || '');
}

function metricBox(label, baseline, latest, delta, deltaPct, lowerIsBetter, unit) {
  const cls      = deltaClass(delta, lowerIsBetter);
  const bVal     = baseline !== null && baseline !== undefined ? baseline + (unit||'') : '—';
  const aVal     = latest   !== null && latest   !== undefined ? latest   + (unit||'') : '—';
  const dLabel   = deltaPct !== null && deltaPct !== undefined
    ? fmtDelta(deltaPct, '%', lowerIsBetter)
    : fmtDelta(delta, unit||'', lowerIsBetter);

  return `<div class="metric-box ${cls}">
    <div class="metric-label">${label}</div>
    <div class="metric-before">Antes: ${bVal}</div>
    <div class="metric-after">${latest !== null && latest !== undefined ? aVal : '<span class="no-data-msg">sin datos</span>'}</div>
    ${delta !== null ? `<div class="metric-delta">${dLabel}</div>` : ''}
  </div>`;
}

const ALERTA_ICONS = {warning: '⚠', bueno: '✓', neutro: '—'};

function renderAlertas(alertas) {
  if (!alertas || !alertas.length) return '';
  return alertas.map(a => `
    <div class="alerta-banner ${a.nivel}">
      <span class="alerta-icon">${ALERTA_ICONS[a.nivel] || '•'}</span>
      <div>
        <div>${a.mensaje}</div>
        <div class="alerta-fecha">${a.fecha || ''}</div>
      </div>
    </div>`).join('');
}

function renderTimeline(it) {
  const snaps   = it.snapshots || [];
  const b       = it.baseline  || {};
  const basePOS = b.posicion;
  const baseVIS = b.visitas_7d;
  const baseDate = (b.fecha || it.fecha_opt || '').slice(0, 10);

  let rows = `<tr class="baseline-row">
    <td>📌 ${baseDate}</td>
    <td>${basePOS !== null && basePOS !== undefined ? '#' + basePOS : '—'}</td>
    <td>${baseVIS !== null && baseVIS !== undefined ? baseVIS : '—'}</td>
    <td><span style="font-size:.65rem;background:var(--color-info-100);color:var(--color-info-700);padding:1px 6px;border-radius:8px;font-weight:700">BASELINE</span></td>
  </tr>`;

  snaps.forEach(s => {
    const pos = s.posicion;
    const vis = s.visitas_7d;
    const fecha = (s.fecha || '').slice(0, 10);
    let posCell = pos !== null && pos !== undefined ? '#' + pos : '—';
    let posCls  = 'timeline-pos-flat';
    let deltaTxt = '';
    if (basePOS !== null && basePOS !== undefined && pos !== null && pos !== undefined) {
      const d = pos - basePOS;
      if (d < 0) { posCls = 'timeline-pos-up';   deltaTxt = ` <span style="font-size:.65rem">(${d})</span>`; }
      if (d > 0) { posCls = 'timeline-pos-down';  deltaTxt = ` <span style="font-size:.65rem">(+${d})</span>`; }
    }
    let visDelta = '';
    if (baseVIS !== null && baseVIS !== undefined && vis !== null && vis !== undefined) {
      const dv = vis - baseVIS;
      const sign = dv > 0 ? '+' : '';
      const col  = dv > 0 ? 'var(--color-success-700)' : dv < 0 ? 'var(--color-critical-500)' : 'var(--color-neutral-600)';
      visDelta = ` <span style="font-size:.65rem;color:${col}">(${sign}${dv})</span>`;
    }
    rows += `<tr>
      <td>${fecha}</td>
      <td class="${posCls}">${posCell}${deltaTxt}</td>
      <td>${vis !== null && vis !== undefined ? vis : '—'}${visDelta}</td>
      <td style="color:var(--color-neutral-400);font-size:.68rem">${s.ventas_total !== undefined ? s.ventas_total + ' vtas' : ''}</td>
    </tr>`;
  });

  const tbl = `<table class="timeline-table">
    <thead><tr>
      <th>Fecha</th><th>Posición</th><th>Visitas 7d</th><th>Ventas</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;

  const id = 'tl-' + it.item_id.replace(/[^a-z0-9]/gi, '_');
  return `<button class="timeline-toggle" onclick="(function(b,t){b.innerHTML=(t.style.display==='none'?(t.style.display='',b.innerHTML.replace('▶','▼')):(t.style.display='none',b.innerHTML.replace('▼','▶')))})(this,document.getElementById('${id}'))">
    <i class="bi bi-clock-history"></i> ▶ Ver línea de tiempo (${snaps.length} actualización${snaps.length !== 1 ? 'es' : ''})
  </button>
  <div id="${id}" style="display:none">${tbl}</div>`;
}

// ── Sprint 3.2 — Banner del Veredicto IA ─────────────────────────────────
const REC_LABELS = {
  replicar:  '🚀 Replicar patrón a publicaciones similares',
  mantener:  '✓ Mantener — seguir midiendo',
  regenerar: '🔄 Regenerar optimización con aprendizajes',
  revertir:  '↩ Revertir cambios',
};

function renderVeredictoBanner(it) {
  const v = it.veredicto_estado;
  if (!v || !v.estado) return '';

  // Estado: data_insuficiente — banner azul informativo
  if (v.estado === 'data_insuficiente') {
    const dias  = v.dias_transcurridos || 0;
    const falt  = v.dias_faltantes;
    const proxy = v.proxima_evaluacion;
    const snaps = v.snapshots_usados || 0;
    let msg;
    if (falt && falt > 0) {
      msg = `<strong>📊 Midiendo —</strong> veredicto disponible en <strong>${falt} día${falt!==1?'s':''}</strong> (${proxy}). ${snaps} snapshot${snaps!==1?'s':''} capturados.`;
    } else {
      msg = `<strong>📊 Midiendo —</strong> ${v.mensaje || 'data parcial.'}`;
    }
    return `<div class="veredicto-banner veredicto-banner--info">
      <div class="veredicto-razon">${msg}</div>
    </div>`;
  }

  // Estado: pendiente_de_generar — cumple gates pero no se generó aún
  if (v.estado === 'pendiente_de_generar') {
    return `<div class="veredicto-banner veredicto-banner--info">
      <div class="veredicto-header">
        <span>📊 Listo para evaluar</span>
        <span class="score">${v.dias_transcurridos}d transcurridos · ${v.snapshots_usados} snapshots</span>
      </div>
      <div class="veredicto-razon">
        Cumple los criterios para un veredicto IA. Generalo manualmente o esperá al cron del lunes.
      </div>
      <div class="veredicto-actions">
        <button data-action="generar-veredicto" data-item="${escAttr(it.item_id)}">
          🤖 Generar veredicto ahora
        </button>
      </div>
    </div>`;
  }

  // Estado: ya_existe — render del veredicto persistido
  if (v.estado !== 'ya_existe') return '';
  const ver = v.veredicto || {};
  const tipo  = ver.veredicto || 'neutra';
  const ic = tipo === 'ganadora' ? '✅' : tipo === 'perdedora' ? '❌' : '🟡';
  const lbl = tipo === 'ganadora' ? 'Ganadora' : tipo === 'perdedora' ? 'Perdedora' : 'Neutra';
  const score = ver.score_exito;
  const rec   = ver.recomendacion || 'mantener';
  const recLabel = REC_LABELS[rec] || rec;
  const fechaV = ver.fecha_veredicto || '';
  const snaps  = ver.snapshots_usados || 0;
  const dbg = ver._debug || {};

  // CTAs por recomendación. Solo regenerar es funcional en Sprint 3.2.
  // Replicar y revertir quedan disabled hasta Sprint 3.3.
  let cta = '';
  if (rec === 'regenerar') {
    cta = `<button data-action="cta-regenerar" data-item="${escAttr(it.item_id)}">
             🔄 Regenerar con aprendizajes
           </button>`;
  } else if (rec === 'replicar') {
    cta = `<button data-action="cta-replicar" data-item="${escAttr(it.item_id)}"
                   title="Buscar productos similares para aplicar el patrón ganador">
             🚀 Replicar patrón a similares
           </button>`;
  } else if (rec === 'revertir') {
    cta = `<button data-action="cta-revertir" disabled
                   title="Disponible en Sprint 3.3">
             ↩ Revertir cambios (Sprint 3.3)
           </button>`;
  }
  // Botón descartar siempre visible
  const descartar = `<button data-action="descartar-veredicto"
                             data-item="${escAttr(it.item_id)}">
                       🗑 Descartar veredicto
                     </button>`;

  // Alertas inteligentes del veredicto (caveats que detectó la IA)
  const alertasHtml = (ver.alertas && ver.alertas.length)
    ? `<div class="veredicto-alertas">
         <strong>Alertas:</strong>
         <ul>${ver.alertas.map(a => `<li>${a}</li>`).join('')}</ul>
       </div>` : '';

  // Métricas clave que más movieron — chips compactos
  const mkChips = (ver.metricas_clave || []).map(m =>
    `<span style="background:rgba(0,0,0,.07);padding:1px 7px;border-radius:8px;font-size:.7rem">${m}</span>`
  ).join(' ');

  return `<div class="veredicto-banner veredicto-banner--${tipo}">
    <div class="veredicto-header">
      <span>${ic} ${lbl}</span>
      ${score !== undefined ? `<span class="score">Score ${score}/100</span>` : ''}
      ${mkChips ? `<span style="margin-left:auto;display:flex;gap:.3rem;align-items:center">${mkChips}</span>` : ''}
    </div>
    <p class="veredicto-razon">${ver.razonamiento || ''}</p>
    <div class="veredicto-recomendacion">
      <strong>Recomendación:</strong> ${recLabel}.
      <span style="opacity:.78">${ver.razon_recomendacion || ''}</span>
    </div>
    ${alertasHtml}
    <div class="veredicto-actions">${cta}${descartar}</div>
    <div class="veredicto-meta">
      Generado el ${fechaV} · ${snaps} snapshots usados
      ${dbg.threshold_aplicado ? ` · threshold ${dbg.threshold_aplicado}%` : ''}
      ${dbg.modelo ? ` · ${dbg.modelo}` : ''}
    </div>
  </div>`;
}

async function fetchVeredictosParaItems(items) {
  // Carga el estado del veredicto para cada item en paralelo. Tolerante a
  // fallas individuales — si un fetch falla, el banner queda oculto para
  // ese item pero el resto se renderiza normal.
  await Promise.all(items.map(async (it) => {
    try {
      const r = await fetch(`/api/veredicto/${encodeURIComponent(ALIAS)}/${encodeURIComponent(it.item_id)}`);
      const d = await r.json();
      if (d && d.ok) it.veredicto_estado = d;
    } catch (_) {
      // silencio — banner no se muestra para este item
    }
  }));
}

async function generarVeredictoAhora(itemId) {
  if (!confirm(`Generar veredicto IA para ${itemId}?\n\nEsto consume tokens de Claude (~$0.05 USD).`)) return;
  try {
    const r = await fetch(`/api/veredicto/${encodeURIComponent(ALIAS)}/${encodeURIComponent(itemId)}/generar`,
                          {method: 'POST', headers: {'Content-Type': 'application/json'},
                           body: JSON.stringify({})});
    const d = await r.json();
    if (d.ok) {
      await loadMonitor();
    } else {
      alert('Error: ' + (d.mensaje || d.error || 'desconocido'));
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function descartarVeredictoBanner(itemId) {
  const razon = prompt('Razón del descarte (opcional):') || '';
  try {
    const r = await fetch(`/api/veredicto/${encodeURIComponent(ALIAS)}/${encodeURIComponent(itemId)}/descartar`,
                          {method: 'POST', headers: {'Content-Type': 'application/json'},
                           body: JSON.stringify({razon})});
    const d = await r.json();
    if (d.ok) await loadMonitor();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function regenerarOptimizacion(itemId) {
  // Sprint 3.2: la "regeneración" lleva al usuario a Optimizar IA con el item
  // pre-cargado. La integración profunda (heredar aprendizajes del veredicto)
  // queda para Sprint 3.3.
  window.location.href = `/optimizar/${encodeURIComponent(ALIAS)}?item=${encodeURIComponent(itemId)}`;
}

document.addEventListener('click', (ev) => {
  const btn = ev.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const item   = btn.dataset.item;
  if (!item) return;
  if (action === 'generar-veredicto')   generarVeredictoAhora(item);
  if (action === 'descartar-veredicto') descartarVeredictoBanner(item);
  if (action === 'cta-regenerar')       regenerarOptimizacion(item);
  if (action === 'cta-replicar')        abrirModalReplicar(item);
});

// ── Sprint 3.3 — Replicar patrón ganador ─────────────────────────────────
async function abrirModalReplicar(itemIdOrigen) {
  // Crear/abrir modal lazy (una sola instancia)
  let modal = document.getElementById('modalReplicar');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'modalReplicar';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:2rem;';
    modal.innerHTML = '<div id="modalReplicarBody" style="background:var(--color-neutral-0);border-radius:12px;max-width:980px;width:100%;padding:1.5rem;box-shadow:0 10px 40px rgba(0,0,0,.2)"></div>';
    document.body.appendChild(modal);
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
  }
  modal.style.display = 'flex';
  const body = document.getElementById('modalReplicarBody');
  body.innerHTML = `<div style="text-align:center;padding:2rem">
    <div class="spinner-border" role="status"></div>
    <p style="margin-top:1rem;color:var(--color-neutral-600)">Buscando productos similares en tu catálogo…</p>
    <p style="font-size:.8rem;color:var(--color-neutral-400)">Esto puede tardar 5-10 segundos</p>
  </div>`;

  try {
    const r = await fetch(`/api/replicar/${encodeURIComponent(ALIAS)}/${encodeURIComponent(itemIdOrigen)}/similares?max_resultados=10`);
    const d = await r.json();
    if (!d.ok) {
      body.innerHTML = renderModalError(d.error || 'Error desconocido', itemIdOrigen);
      return;
    }
    body.innerHTML = renderModalCandidatos(d, itemIdOrigen);
  } catch (e) {
    body.innerHTML = renderModalError(e.message, itemIdOrigen);
  }
}

function renderModalError(msg, itemIdOrigen) {
  return `<div>
    <h4 style="margin:0 0 .5rem">No se pudo abrir el replicador</h4>
    <p style="color:var(--color-critical-500);margin:0 0 1rem">${msg}</p>
    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('modalReplicar').style.display='none'">Cerrar</button>
  </div>`;
}

function renderModalCandidatos(data, itemIdOrigen) {
  const candidatos = data.candidatos || [];
  const aplicables = candidatos.filter(c => !c.bloqueado_por);
  const bloqueados = candidatos.filter(c =>  c.bloqueado_por);

  const headerHtml = `<div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid #e5e7eb;padding-bottom:1rem;margin-bottom:1rem">
    <div>
      <h4 style="margin:0 0 .25rem">🚀 Replicar patrón ganador</h4>
      <div style="font-size:.85rem;color:var(--color-neutral-600)">Origen: <strong>${data.titulo_origen || itemIdOrigen}</strong></div>
      <div style="font-size:.78rem;color:var(--color-neutral-400);margin-top:.25rem">${aplicables.length} candidato${aplicables.length!==1?'s':''} disponible${aplicables.length!==1?'s':''} · ${bloqueados.length} bloqueado${bloqueados.length!==1?'s':''}</div>
    </div>
    <button class="btn-close" aria-label="Cerrar" onclick="document.getElementById('modalReplicar').style.display='none'"></button>
  </div>`;

  if (candidatos.length === 0) {
    return headerHtml + `<div style="text-align:center;padding:1.5rem;color:var(--color-neutral-600)">
      No se encontraron productos similares en tu catálogo (umbral mínimo: 30% similitud).
      <p style="font-size:.85rem;margin-top:.5rem">Esto es normal si el patrón ganador es muy específico.</p>
    </div>`;
  }

  const aplicablesHtml = aplicables.map(c => `
    <div class="candidato-card" style="border:1px solid #e5e7eb;border-radius:8px;padding:.85rem;margin-bottom:.75rem">
      <div style="display:flex;justify-content:space-between;gap:1rem;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:.92rem;margin-bottom:.2rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.titulo}</div>
          <div style="font-size:.75rem;color:var(--color-neutral-600)">
            ${c.item_id} · $${c.price ? c.price.toLocaleString('es-AR') : 'n/d'} · ${c.sold_quantity || 0} vendidos
            ${c.permalink ? `· <a href="${c.permalink}" target="_blank" rel="noopener">ver en ML</a>` : ''}
          </div>
          <div style="font-size:.78rem;color:var(--color-info-500);margin-top:.25rem">
            <strong>${Math.round(c.similitud * 100)}% similitud</strong> ${c.mismo_categoria ? '· misma categoría' : ''} · ${c.motivo_inclusion}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:.3rem">
          <button class="btn btn-primary btn-sm" onclick="generarPreviewReplica('${itemIdOrigen}','${c.item_id}')">
            👁 Preview IA
          </button>
          <button class="btn btn-outline-secondary btn-sm" onclick="descartarSugerencia('${itemIdOrigen}','${c.item_id}')">
            🗑 Descartar
          </button>
        </div>
      </div>
      <div id="preview-${c.item_id}" style="display:none;margin-top:.75rem;padding-top:.75rem;border-top:1px dashed #e5e7eb"></div>
    </div>
  `).join('');

  const bloqueadosHtml = bloqueados.length ? `
    <details style="margin-top:1rem">
      <summary style="cursor:pointer;color:var(--color-neutral-400);font-size:.85rem">Ver ${bloqueados.length} bloqueado${bloqueados.length!==1?'s':''}</summary>
      <div style="margin-top:.5rem">
        ${bloqueados.map(c => `<div style="padding:.5rem;border:1px dashed #e5e7eb;border-radius:6px;margin-bottom:.4rem;font-size:.82rem;opacity:.65">
          <strong>${c.titulo.slice(0,60)}…</strong> — <span style="color:var(--color-critical-500)">${c.bloqueado_por}</span>
        </div>`).join('')}
      </div>
    </details>` : '';

  const noteHtml = `<div style="font-size:.75rem;color:var(--color-neutral-400);margin-top:1rem;padding:.5rem;background:var(--color-neutral-50);border-radius:6px">
    💡 Cada preview consume ~$0.005 USD (Claude Haiku). Hard cap: $5/mes.
    Aplicación es 1-por-1 — siempre revisás antes de aplicar.
  </div>`;

  return headerHtml + aplicablesHtml + bloqueadosHtml + noteHtml;
}

async function generarPreviewReplica(itemOrigen, itemDestino) {
  const cont = document.getElementById('preview-' + itemDestino);
  if (!cont) return;
  cont.style.display = 'block';
  cont.innerHTML = '<div style="color:var(--color-neutral-600);font-size:.85rem"><span class="spinner-border spinner-border-sm"></span> Generando propuesta IA (Haiku, ~5s, ~$0.005)…</div>';
  try {
    const r = await fetch(`/api/replicar/${encodeURIComponent(ALIAS)}/${encodeURIComponent(itemOrigen)}/${encodeURIComponent(itemDestino)}/preview`,
                          {method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({})});
    const d = await r.json();
    if (!d.ok) {
      cont.innerHTML = `<div style="color:var(--color-critical-500);font-size:.85rem">❌ ${d.error || 'Error'}</div>`;
      return;
    }
    const p = d.preview || (d.cached ? d.preview : null);
    if (!p) { cont.innerHTML = '<em>Sin propuesta</em>'; return; }
    if (!p.aplicable) {
      cont.innerHTML = `<div style="background:var(--color-warning-100);padding:.6rem;border-radius:6px;font-size:.85rem">
        <strong>⚠️ El patrón no aplica a este producto.</strong><br>
        ${p.razon_no_aplicable || 'La IA determinó que el patrón no es transferible.'}
      </div>`;
      return;
    }
    const cambios = (p.cambios_clave || []).map(c => `<li>${c}</li>`).join('');
    cont.innerHTML = `
      <div style="font-size:.78rem;color:var(--color-neutral-600);margin-bottom:.5rem">
        💡 Propuesta IA · Confianza ${p.confianza}/100 ${d.cached ? '<span style="background:var(--color-warning-100);padding:1px 5px;border-radius:4px">cacheada</span>' : ''}
      </div>
      <div style="margin-bottom:.6rem">
        <label style="font-size:.78rem;color:var(--color-neutral-600);display:block;margin-bottom:.2rem">Título propuesto (${p.titulo_propuesto.length}/60):</label>
        <input id="titReplica-${itemDestino}" type="text" maxlength="60" value="${escAttr(p.titulo_propuesto)}" style="width:100%;padding:.4rem;border:1px solid #e5e7eb;border-radius:4px;font-size:.88rem">
        <div style="font-size:.72rem;color:var(--color-neutral-400);margin-top:.2rem"><em>${p.titulo_motivo || ''}</em></div>
      </div>
      <div style="margin-bottom:.6rem">
        <label style="font-size:.78rem;color:var(--color-neutral-600);display:block;margin-bottom:.2rem">Descripción propuesta:</label>
        <textarea id="descReplica-${itemDestino}" rows="6" style="width:100%;padding:.4rem;border:1px solid #e5e7eb;border-radius:4px;font-size:.85rem">${p.descripcion_propuesta}</textarea>
      </div>
      ${cambios ? `<div style="font-size:.78rem;color:#475569;margin-bottom:.6rem"><strong>Cambios clave:</strong><ul style="margin:.2rem 0 0 1rem;padding:0">${cambios}</ul></div>` : ''}
      <div style="display:flex;gap:.5rem">
        <button class="btn btn-success btn-sm" onclick="aplicarReplica('${itemOrigen}','${itemDestino}')">✓ Aplicar a ML</button>
        <button class="btn btn-outline-secondary btn-sm" onclick="document.getElementById('preview-${itemDestino}').style.display='none'">Cerrar preview</button>
      </div>`;
  } catch (e) {
    cont.innerHTML = `<div style="color:var(--color-critical-500);font-size:.85rem">❌ ${e.message}</div>`;
  }
}

async function aplicarReplica(itemOrigen, itemDestino) {
  const tit  = document.getElementById('titReplica-' + itemDestino);
  const desc = document.getElementById('descReplica-' + itemDestino);
  if (!tit || !desc) return;
  if (!confirm(`Aplicar el patrón a ${itemDestino}?\n\nSe va a modificar título y descripción en MercadoLibre.`)) return;
  const btn = event.target;
  btn.disabled = true;
  btn.innerText = 'Aplicando…';
  try {
    const r = await fetch(`/api/replicar/${encodeURIComponent(ALIAS)}/${encodeURIComponent(itemOrigen)}/${encodeURIComponent(itemDestino)}/aplicar`,
                          {method: 'POST', headers: {'Content-Type':'application/json'},
                           body: JSON.stringify({titulo: tit.value, descripcion: desc.value})});
    const d = await r.json();
    if (d.ok) {
      const cont = document.getElementById('preview-' + itemDestino);
      cont.innerHTML = `<div style="background:var(--color-success-100);padding:.6rem;border-radius:6px;font-size:.88rem;color:#166534">
        ✅ Réplica aplicada en ${itemDestino}. Campos: <strong>${(d.applied || []).join(', ')}</strong>.
        Empieza a medirse — verás el veredicto en ~7 días.
      </div>`;
    } else {
      btn.disabled = false; btn.innerText = '✓ Aplicar a ML';
      alert('Error al aplicar: ' + (d.error || 'desconocido'));
    }
  } catch (e) {
    btn.disabled = false; btn.innerText = '✓ Aplicar a ML';
    alert('Error: ' + e.message);
  }
}

async function descartarSugerencia(itemOrigen, itemDestino) {
  const razon = prompt('¿Por qué descartás esta sugerencia? (opcional)') || '';
  try {
    const r = await fetch(`/api/replicar/${encodeURIComponent(ALIAS)}/${encodeURIComponent(itemOrigen)}/${encodeURIComponent(itemDestino)}/descartar`,
                          {method: 'POST', headers: {'Content-Type':'application/json'},
                           body: JSON.stringify({razon})});
    const d = await r.json();
    if (d.ok) abrirModalReplicar(itemOrigen);   // refrescar lista
  } catch (e) { alert('Error: ' + e.message); }
}

function renderItem(it) {
  const b  = it.baseline       || {};
  const u  = it.ultimo_snapshot || {};
  const d  = it.deltas         || {};
  const hasSnapshot = it.snapshots_n > 0;
  const alertas = (it.alertas || []).filter(a => a.nivel !== 'neutro' || true);

  // Alertas
  const alertasBlock = renderAlertas(alertas);

  // Título compare
  let tituloBlock = '';
  if (it.origen === 'nueva') {
    // Publicación nueva creada con toda la optimización aplicada
    const origLink = it.item_id_original
      ? ` <span style="font-size:.72rem;color:var(--color-neutral-500)">(reemplaza a ${it.item_id_original})</span>` : '';
    tituloBlock = `<div class="titulo-compare">
      <div class="titulo-box despues" style="flex:1">
        <div class="titulo-label">🆕 Nueva publicación — optimización completa aplicada${origLink}</div>
        ${it.titulo_despues || it.titulo_producto}
      </div>
    </div>`;
  } else if (it.titulo_antes || it.titulo_despues) {
    const mismosT = it.titulo_antes && it.titulo_despues && it.titulo_antes.trim() === it.titulo_despues.trim();
    if (mismosT) {
      tituloBlock = `<div class="titulo-compare">
        <div class="titulo-box antes" style="flex:1">
          <div class="titulo-label">📌 Título (sin cambio — publicación con ventas)</div>
          ${it.titulo_antes}
        </div>
      </div>`;
    } else {
      tituloBlock = `<div class="titulo-compare">
        <div class="titulo-box antes">
          <div class="titulo-label">✗ Título anterior</div>
          ${it.titulo_antes || '<em>no registrado</em>'}
        </div>
        <div class="titulo-box despues">
          <div class="titulo-label">✓ Título aplicado</div>
          ${it.titulo_despues || '<em>sin cambio de título</em>'}
        </div>
      </div>`;
    }
  }

  // Métricas — siempre mostrar baseline; comparar con último snapshot si hay
  const hasBaseline = b.visitas_7d !== undefined || b.ventas_30d !== undefined || b.ventas_total !== undefined || b.posicion !== undefined;
  let metricsBlock = '';
  if (hasBaseline) {
    const snapInfo = hasSnapshot
      ? '<div class="snapshot-info">Última actualización: ' + (u.fecha || '—') + ' · ' + it.snapshots_n + ' snapshot' + (it.snapshots_n !== 1 ? 's' : '') + '</div>'
      : '<div class="no-data-msg" style="margin-top:.5rem;margin-bottom:.25rem">Métricas de línea base capturadas · Actualizá en unos días para ver la evolución.</div>';

    // Bloque visitas ayer (solo si hay datos del último snapshot)
    const ayer = it.visitas_ayer;
    const diarioBlock = (ayer !== null && ayer !== undefined) ? `
    <div style="display:flex;gap:.75rem;margin-bottom:.75rem;align-items:center;flex-wrap:wrap">
      <div style="background:var(--color-neutral-50);border:1px solid var(--color-neutral-200);border-radius:8px;padding:.45rem .9rem;display:flex;align-items:center;gap:.5rem">
        <i class="bi bi-calendar-day" style="color:var(--color-neutral-600);font-size:.85rem"></i>
        <span style="font-size:.75rem;color:var(--color-neutral-600);font-weight:600">Visitas ayer</span>
        <span style="font-size:1.15rem;font-weight:800;color:${ayer === 0 ? 'var(--color-critical-500)' : 'var(--color-neutral-800)'}">${ayer}</span>
        ${ayer === 0 ? '<span style="font-size:.65rem;color:var(--color-critical-500);font-weight:600">⚠ sin tráfico ayer</span>' : ''}
      </div>
      <div style="font-size:.68rem;color:var(--color-neutral-400)">
        <i class="bi bi-info-circle me-1"></i>Actualizá para refrescar
      </div>
    </div>` : '';

    metricsBlock = `
    ${diarioBlock}
    <div class="metrics-grid">
      ${metricBox('Visitas 7d',       b.visitas_7d,    hasSnapshot ? u.visitas_7d    : undefined, hasSnapshot ? d.visitas_7d    : null, hasSnapshot ? d.visitas_pct  : null, false, '')}
      ${metricBox('Ventas 30d',       b.ventas_30d,    hasSnapshot ? u.ventas_30d    : undefined, hasSnapshot ? d.ventas_30d    : null, hasSnapshot ? d.ventas_pct   : null, false, '')}
      ${metricBox('Ventas acumuladas',b.ventas_total,  hasSnapshot ? u.ventas_total  : undefined, hasSnapshot ? d.ventas_total  : null, null,                                false, '')}
      ${metricBox('Conversión',       b.conv_pct,      hasSnapshot ? u.conv_pct      : undefined, hasSnapshot ? d.conv_pct      : null, null,                                false, '%')}
      ${metricBox('Posición',         b.posicion,      hasSnapshot ? u.posicion      : undefined, hasSnapshot ? d.posicion      : null, null,                                true,  '°')}
    </div>
    ${snapInfo}`;
  } else {
    metricsBlock = `<div class="no-data-msg" style="margin-bottom:.75rem">
      Sin datos de seguimiento aún — actualizá las métricas para ver la evolución.
    </div>`;
  }

  // Badges de qué se aplicó
  const appliedBadges = (it.applied || []).map(a =>
    `<span class="badge-applied">${a}</span>`).join('');

  // Capturing placeholder — se muestra mientras corre la captura async
  let capturingBlock = '';
  if (it._capturing) {
    capturingBlock = `<div class="capturing-banner">
      <span class="pulse"></span>
      <span><strong>Capturando baseline completo…</strong> recargá en 10-15 segundos para ver las 14 métricas.</span>
    </div>`;
  } else if (it._capture_error) {
    capturingBlock = `<div class="alerta-banner warning" style="font-size:.78rem">
      <span class="alerta-icon">⚠</span>
      <span>Error capturando baseline: ${it._capture_error}</span>
    </div>`;
  }

  // Vista expandible con las 5 secciones nuevas (solo si baseline tiene v2)
  const detailBlock = renderDetalleExpansible(it);

  // Banner "Baseline parcial" — aparece SOLO si baseline está en v1 (legacy)
  // y la captura no está en curso
  const baselineVer = it.baseline_version || (it.baseline && it.baseline.version) || 1;
  let parcialBlock = '';
  if (baselineVer < 2 && !it._capturing) {
    parcialBlock = `<div class="recapture-banner">
      <i class="bi bi-info-circle-fill" style="color:var(--color-warning-500);flex-shrink:0;margin-top:.1rem"></i>
      <div class="desc">
        <strong>Baseline parcial</strong> — esta optimización se aplicó antes del Sprint 3
        y solo tiene métricas básicas (visitas, ventas, conversión, posición).
        Podés re-capturar para tener las 14 métricas completas, pero el snapshot va a ser del
        <strong>estado de hoy</strong>, no del momento original de la optimización.
      </div>
      <button class="btn-recapturar" onclick="abrirModalRecapturar('${it.item_id}')">
        <i class="bi bi-arrow-clockwise me-1"></i>Re-capturar baseline
      </button>
    </div>`;
  }

  // Badge "parcial" en el header del card si baseline es v1 legacy
  const partialBadge = (baselineVer < 2 && !it._capturing)
    ? `<span class="badge-parcial" title="Baseline capturado antes del Sprint 3 — métricas básicas">⚠ Parcial</span>`
    : '';

  return `<div class="item-card" id="card-${it.item_id}"
       data-item-name="${escAttr(it.titulo_producto)}"
       data-fecha-opt="${escAttr(it.fecha_opt)}"
       data-item-id-original="${escAttr(it.item_id_original)}">
    <div class="item-card-header">
      <div>
        <div class="item-name">${it.titulo_producto}${partialBadge}</div>
        <div class="item-meta">
          ${it.item_id}
          ${appliedBadges}
          <span class="days-badge" style="margin-left:.5rem">
            Optimizado hace ${it.dias_elapsed} día${it.dias_elapsed !== 1 ? 's' : ''}
          </span>
          <span style="color:var(--color-neutral-400);font-size:.72rem;margin-left:.5rem">${it.fecha_opt}</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-refresh" onclick="refreshItem('${it.item_id}', this)">
          <i class="bi bi-arrow-clockwise"></i> Actualizar
        </button>
        <button class="btn-delete" onclick="deleteItem('${it.item_id}', '${it.titulo_producto.replace(/'/g, "\\'")}')">
          <i class="bi bi-trash3"></i> Eliminar
        </button>
      </div>
    </div>
    <div class="item-card-body">
      ${capturingBlock}
      ${alertasBlock}
      ${tituloBlock}
      ${renderInfoOriginal(it)}
      ${renderVeredictoBanner(it)}
      ${metricsBlock}
      ${detailBlock}
      ${parcialBlock}
      ${it.snapshots_n > 0 ? renderTimeline(it) : ''}
    </div>
  </div>`;
}

// ── Sprint 3.1 ext republicación — info compacta de la pub original ─────────
function renderInfoOriginal(it) {
  if (it.origen !== 'nueva' || !it.item_id_original) return '';

  const po = it.publicacion_original || {};
  const tieneSnapshot = !!(po.snapshot_al_republicar);
  const esRetroactivo = !!po.snapshot_al_republicar_es_retroactivo;
  const estado        = po.estado_ml || 'unknown';
  const ultimaAct     = po.ultimo_snapshot && po.ultimo_snapshot.fecha
                          ? po.ultimo_snapshot.fecha
                          : (po.fecha_estado || '—');

  const retroBadge = esRetroactivo
    ? `<span class="retroactivo" title="Snapshot capturado el ${po.fecha_snapshot_capturado || '?'}, no refleja el estado al momento de la republicación">⚠ retroactivo</span>`
    : '';

  // Si no tiene snapshot del original, mostrar botón para revincular
  if (!tieneSnapshot) {
    return `<div class="original-info">
      <span class="label">📌 Original</span>
      <code>${it.item_id_original}</code>
      <span class="text-muted" style="font-size:.72rem">sin snapshot referencial — capturar para comparativa A/B</span>
      <button class="btn-revincular" onclick="abrirModalRevincular('${it.item_id}')">
        <i class="bi bi-link-45deg me-1"></i>Re-vincular y capturar
      </button>
    </div>`;
  }

  return `<div class="original-info">
    <span class="label">📌 Original</span>
    <code>${it.item_id_original}</code>
    <span class="estado-pill ${estado}">${estado}</span>
    ${retroBadge}
    <span style="color:var(--color-neutral-600);font-size:.72rem">últ. snapshot: ${ultimaAct}</span>
  </div>`;
}

// ── Modal "Re-vincular y capturar snapshot retroactivo" ─────────────────────
let _revinc_target = null;

function abrirModalRevincular(itemIdNuevo) {
  _revinc_target = itemIdNuevo;
  const card = document.getElementById('card-' + itemIdNuevo);
  const mlaOrig  = (card && card.dataset.itemIdOriginal) || '—';
  const fechaOpt = (card && card.dataset.fechaOpt) || '';
  const html = `
    <h5 style="font-weight:700;color:var(--color-neutral-800);margin-bottom:.6rem">
      <i class="bi bi-link-45deg text-warning me-1"></i>Re-vincular y capturar snapshot
    </h5>
    <p style="font-size:.86rem;color:#475569;margin-bottom:.55rem">
      Publicación nueva: <strong>${itemIdNuevo}</strong><br>
      Publicación original: <strong>${mlaOrig}</strong>
    </p>
    <p style="font-size:.82rem;color:var(--color-neutral-600);margin-bottom:.4rem">
      Republicación vinculada el: <strong>${fechaOpt || 'fecha desconocida'}</strong>
    </p>
    <div class="modal-warn">
      <strong>⚠ Importante:</strong> el snapshot de <code>${mlaOrig}</code> se va a capturar con
      el estado <strong>de HOY</strong>. Como la republicación ya ocurrió, este snapshot
      <strong>NO refleja</strong> el estado real de la original al momento del cambio.
      Va a quedar marcado como <em>retroactivo</em> en el JSON.
    </div>
    <p style="font-size:.78rem;color:var(--color-neutral-600)">
      A partir de ahora, el cron del Monitor refresca AMBAS publicaciones (la nueva y la original)
      para poder hacer comparativa A/B en Sprint 3.2.
    </p>
    <div style="display:flex;gap:.6rem;justify-content:flex-end;margin-top:1rem">
      <button onclick="cerrarModalRevinc()" style="padding:.5rem 1rem;background:transparent;border:1px solid #cbd5e1;border-radius:6px;cursor:pointer">Cancelar</button>
      <button id="btn-confirmar-revinc" onclick="ejecutarRevincular()" style="padding:.5rem 1.2rem;background:var(--color-warning-500);color:var(--color-neutral-0);border:none;border-radius:6px;cursor:pointer;font-weight:600">
        Capturar snapshot retroactivo
      </button>
    </div>`;
  let modal = document.getElementById('modal-revinc');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'modal-revinc';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:1000;align-items:center;justify-content:center';
    modal.innerHTML = '<div id="modal-revinc-content" style="background:var(--color-neutral-0);border-radius:12px;max-width:560px;width:92%;padding:1.5rem"></div>';
    document.body.appendChild(modal);
  }
  document.getElementById('modal-revinc-content').innerHTML = html;
  modal.style.display = 'flex';
}

function cerrarModalRevinc() {
  const modal = document.getElementById('modal-revinc');
  if (modal) modal.style.display = 'none';
  _revinc_target = null;
}

async function ejecutarRevincular() {
  if (!_revinc_target) return;
  const btn = document.getElementById('btn-confirmar-revinc');
  btn.disabled = true;
  btn.textContent = 'Capturando…';
  try {
    const r = await fetch(`/api/republicacion-revincular/${encodeURIComponent(ALIAS)}/${encodeURIComponent(_revinc_target)}`,
                          {method: 'POST'});
    const d = await r.json();
    if (d.ok) {
      cerrarModalRevinc();
      await loadMonitor();
    } else {
      btn.disabled = false;
      btn.textContent = 'Capturar snapshot retroactivo';
      alert('Error: ' + (d.error || 'desconocido'));
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Capturar snapshot retroactivo';
    alert('Error: ' + e.message);
  }
}

// ── Modal recapturar baseline (Sprint 3.1 — items legacy) ────────────────────
let _recap_target = null;

function abrirModalRecapturar(itemId) {
  _recap_target = itemId;
  const card = document.getElementById('card-' + itemId);
  const titulo   = (card && card.dataset.itemName) || '';
  const fechaOpt = (card && card.dataset.fechaOpt) || '';
  const html = `
    <h5 style="font-weight:700;color:var(--color-neutral-800);margin-bottom:.6rem">
      <i class="bi bi-arrow-clockwise text-warning me-1"></i>Re-capturar baseline
    </h5>
    <p style="font-size:.86rem;color:#475569;margin-bottom:.55rem">
      Item: <strong>${itemId}</strong><br>${titulo}
    </p>
    <p style="font-size:.82rem;color:var(--color-neutral-600);margin-bottom:.4rem">
      Optimización aplicada el: <strong>${fechaOpt || 'fecha desconocida'}</strong>
    </p>
    <div class="modal-warn">
      <strong>⚠ Importante:</strong> el baseline se va a capturar con el estado <strong>de HOY</strong>.
      Si la optimización fue aplicada hace tiempo, este snapshot <strong>NO refleja</strong> el estado real
      al momento de la optimización. Va a quedar marcado como <em>retroactivo</em> para que sepas
      que es referencial, no histórico.
    </div>
    <p style="font-size:.78rem;color:var(--color-neutral-600)">
      La captura toma 10-15 segundos. Mientras corre, vas a ver "Capturando baseline…" en el card.
    </p>
    <div style="display:flex;gap:.6rem;justify-content:flex-end;margin-top:1rem">
      <button onclick="cerrarModalRecap()" style="padding:.5rem 1rem;background:transparent;border:1px solid #cbd5e1;border-radius:6px;cursor:pointer">Cancelar</button>
      <button id="btn-confirmar-recap" onclick="ejecutarRecapturar()" style="padding:.5rem 1.2rem;background:var(--color-warning-500);color:var(--color-neutral-0);border:none;border-radius:6px;cursor:pointer;font-weight:600">
        Re-capturar ahora
      </button>
    </div>`;
  // Reuso el modal genérico — si no existe, lo creo
  let modal = document.getElementById('modal-recap');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'modal-recap';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:1000;align-items:center;justify-content:center';
    modal.innerHTML = '<div id="modal-recap-content" style="background:var(--color-neutral-0);border-radius:12px;max-width:520px;width:92%;padding:1.5rem"></div>';
    document.body.appendChild(modal);
  }
  document.getElementById('modal-recap-content').innerHTML = html;
  modal.style.display = 'flex';
}

function cerrarModalRecap() {
  const modal = document.getElementById('modal-recap');
  if (modal) modal.style.display = 'none';
  _recap_target = null;
}

async function ejecutarRecapturar() {
  if (!_recap_target) return;
  const btn = document.getElementById('btn-confirmar-recap');
  btn.disabled = true;
  btn.textContent = 'Capturando…';
  try {
    const r = await fetch(`/api/baseline-recapturar/${encodeURIComponent(ALIAS)}/${encodeURIComponent(_recap_target)}`,
                          {method: 'POST'});
    const d = await r.json();
    if (d.ok) {
      cerrarModalRecap();
      // Recargar el monitor en 12 segundos para ver el resultado
      setTimeout(() => loadMonitor(), 12000);
      // Mostrar feedback inmediato
      await loadMonitor();
    } else {
      btn.disabled = false;
      btn.textContent = 'Re-capturar ahora';
      alert('Error: ' + (d.error || 'desconocido'));
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Re-capturar ahora';
    alert('Error: ' + e.message);
  }
}

// ── Sprint 3.1 — render de secciones expandibles del baseline v2 ─────────────
function fmtVal(v, suffix = '') {
  if (v === null || v === undefined || v === '') return null;
  if (typeof v === 'boolean') return v ? '✓ Sí' : '✗ No';
  if (typeof v === 'number')  return Number.isInteger(v) ? v.toLocaleString('es-AR') + suffix : v.toLocaleString('es-AR', {maximumFractionDigits: 2}) + suffix;
  return String(v) + suffix;
}

function detailCell(label, value, suffix = '') {
  const fmt = fmtVal(value, suffix);
  if (fmt === null) {
    return `<div class="detail-cell unavailable">
      <div class="lbl">${label}</div>
      <div class="val">no disponible</div>
    </div>`;
  }
  return `<div class="detail-cell">
    <div class="lbl">${label}</div>
    <div class="val">${fmt}</div>
  </div>`;
}

function renderDetalleExpansible(it) {
  const b = it.baseline || {};
  const ver = it.baseline_version || b.version || 1;
  // Si el baseline NO es v2, mostrar nota y badge "parcial" (parte del commit 4)
  if (ver < 2) return '';

  const vis = b.visibilidad || {};
  const traf = b.trafico || {};
  const ven = b.ventas || {};
  const eng = b.engagement || {};
  const sal = b.salud || {};
  const meta = b._capture_metrics || {};

  // Lista de top keywords
  const kwsHtml = (vis.posicion_top_keywords || []).map(k => `
    <div class="kw-item">
      <span style="color:#475569">${k.kw}</span>
      <span style="font-weight:700;color:${k.posicion ? '#0f172a' : '#cbd5e1'}">
        ${k.posicion ? '#' + k.posicion : 'no rankea'}
      </span>
    </div>
  `).join('') || '<div class="text-muted" style="font-size:.72rem">— no disponible —</div>';

  const id = `detail-${it.item_id.replace(/[^a-z0-9]/gi, '_')}`;
  const captureMeta = meta.duration_ms
    ? `<div class="capture-meta">
        Captura: ${(meta.duration_ms/1000).toFixed(1)}s · ${meta.ml_api_calls_count || 0} llamadas a ML API
        ${meta.duration_breakdown
          ? ' · ' + Object.entries(meta.duration_breakdown).map(([k,v]) => `${k}: ${(v/1000).toFixed(1)}s`).join(' · ')
          : ''}
      </div>`
    : '';

  return `<button class="expand-toggle" onclick="toggleDetail('${id}', this)">
    <i class="bi bi-chevron-right"></i> Ver todas las métricas del baseline
  </button>
  <div id="${id}" class="detail-sections">
    <div class="detail-section">
      <div class="detail-section-title"><i class="bi bi-eye-fill" style="color:#7c3aed"></i>Visibilidad</div>
      <div class="detail-grid">
        ${detailCell('Score Calidad ML', vis.score_calidad_ml, '/100')}
        ${detailCell('Nivel calidad', vis.score_calidad_nivel)}
        ${detailCell('En catálogo', vis.esta_en_catalogo)}
        ${detailCell('Tiene Buy Box', vis.tiene_buy_box)}
      </div>
      <div style="margin-top:.6rem">
        <div class="lbl" style="font-size:.62rem;font-weight:600;color:var(--color-neutral-400);text-transform:uppercase;letter-spacing:.03em;margin-bottom:.3rem">Posición top keywords</div>
        <div class="kw-list">${kwsHtml}</div>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title"><i class="bi bi-bar-chart-fill" style="color:var(--color-info-500)"></i>Tráfico</div>
      <div class="detail-grid">
        ${detailCell('Visitas 7d', traf.visitas_7d)}
        ${detailCell('Visitas 30d', traf.visitas_30d)}
        ${detailCell('Conversión 7d', traf.conversion_7d, '%')}
        ${detailCell('Conversión 30d', traf.conversion_30d, '%')}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title"><i class="bi bi-cart-fill" style="color:var(--color-success-500)"></i>Ventas</div>
      <div class="detail-grid">
        ${detailCell('Unidades 7d', ven.unidades_7d)}
        ${detailCell('Unidades 30d', ven.unidades_30d)}
        ${detailCell('Facturación 7d', ven.facturacion_7d ? '$' + ven.facturacion_7d.toLocaleString('es-AR') : null)}
        ${detailCell('Facturación 30d', ven.facturacion_30d ? '$' + ven.facturacion_30d.toLocaleString('es-AR') : null)}
        ${detailCell('Ticket promedio', ven.ticket_promedio ? '$' + ven.ticket_promedio.toLocaleString('es-AR') : null)}
        ${detailCell('Ventas histórico', ven.ventas_total_historica)}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title"><i class="bi bi-chat-dots-fill" style="color:var(--color-warning-500)"></i>Engagement</div>
      <div class="detail-grid">
        ${detailCell('Preguntas pendientes', eng.preguntas_pendientes)}
        ${detailCell('Preguntas 30d', eng.preguntas_total_30d)}
        ${detailCell('Reseñas', eng.resenas_cantidad)}
        ${detailCell('Promedio estrellas', eng.resenas_promedio_estrellas, ' ★')}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title"><i class="bi bi-shield-check" style="color:var(--color-critical-500)"></i>Salud</div>
      <div class="detail-grid">
        ${detailCell('Reclamos 30d', sal.reclamos_30d)}
        ${detailCell('Cancelaciones 30d', sal.cancelaciones_30d)}
        ${detailCell('Mediaciones 30d', sal.mediaciones_30d)}
      </div>
    </div>
    ${captureMeta}
  </div>`;
}

function toggleDetail(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.classList.toggle('open');
  btn.innerHTML = open
    ? '<i class="bi bi-chevron-down"></i> Ocultar métricas detalladas'
    : '<i class="bi bi-chevron-right"></i> Ver todas las métricas del baseline';
}

async function loadMonitor() {
  try {
    const r = await fetch(`/api/monitor-evolucion/${encodeURIComponent(ALIAS)}`);
    const data = await r.json();
    const container = document.getElementById('monitor-container');
    if (!data.ok || !data.items.length) {
      container.innerHTML = `<div class="empty-state">
        <i class="bi bi-activity"></i>
        <p>No hay publicaciones en el monitor todavía.</p>
        <p style="font-size:.82rem;margin-top:.5rem">
          Cuando apliques una optimización desde <strong>Optimizar IA</strong>,
          la publicación aparecerá aquí automáticamente.
        </p>
      </div>`;
      return;
    }
    // Sprint 3.2 — paralelo fetch de veredictos antes de renderizar
    await fetchVeredictosParaItems(data.items);
    container.innerHTML = data.items.map(renderItem).join('');
  } catch(e) {
    document.getElementById('monitor-container').innerHTML =
      `<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Error al cargar: ${e.message}</p></div>`;
  }
}

async function refreshItem(itemId, btn) {
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Actualizando...';
  try {
    const r = await fetch('/api/monitor-refresh', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({alias: ALIAS, item_id: itemId})
    });
    const data = await r.json();
    if (data.ok) {
      await loadMonitor();
    } else {
      alert('Error: ' + (data.error || 'desconocido'));
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Actualizar';
    }
  } catch(e) {
    alert('Error: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Actualizar';
  }
}

async function deleteItem(itemId, nombre) {
  if (!confirm(`¿Eliminar "${nombre}" del monitor?\n\nEsto no afecta la publicación en ML.`)) return;
  try {
    const r = await fetch('/api/monitor-delete', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({alias: ALIAS, item_id: itemId})
    });
    const data = await r.json();
    if (data.ok) {
      const card = document.getElementById(`card-${itemId}`);
      if (card) card.remove();
      const remaining = document.querySelectorAll('.item-card');
      if (!remaining.length) loadMonitor();
    }
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

loadMonitor().then(() => {
  fetch('/api/monitor-marcar-leidas', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({alias: ALIAS})
  }).then(() => {
    const key = ALIAS.replace(/\s+/g,'_');
    const mb = document.getElementById(`monitor-badge-${key}`);
    if (mb) mb.style.display = 'none';
  }).catch(() => {});
});
</script>
{% endblock %}
