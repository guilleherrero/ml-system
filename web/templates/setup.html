<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Configuración inicial — Sistema ML</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .box { background: #1a1d26; border: 1px solid #2a2d3a; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
    .brand { text-align: center; margin-bottom: 2rem; }
    .brand-icon { width: 52px; height: 52px; background: linear-gradient(135deg,#3b82f6,#6366f1); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 1.4rem; color: #fff; }
    .brand-name { font-size: 1.2rem; font-weight: 700; color: #fff; }
    .brand-sub  { font-size: .78rem; color: #6b7280; margin-top: 2px; }
    .notice { background: #1c2235; border: 1px solid #2a3a5c; border-radius: 8px; padding: 12px 14px; color: #93c5fd; font-size: .82rem; line-height: 1.55; margin-bottom: 1.5rem; display: flex; gap: 8px; }
    .form-label { font-size: .8rem; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; display: block; }
    .form-group { margin-bottom: 1.1rem; }
    .form-control { width: 100%; background: #0f1117; border: 1px solid #2a2d3a; border-radius: 8px; padding: 10px 14px; color: #f1f5f9; font-size: .9rem; outline: none; transition: border-color .15s; }
    .form-control:focus { border-color: #3b82f6; }
    .form-control::placeholder { color: #374151; }
    .hint { font-size: .72rem; color: #6b7280; margin-top: 4px; }
    .btn-primary { width: 100%; background: linear-gradient(135deg,#3b82f6,#6366f1); color: #fff; border: none; border-radius: 8px; padding: 11px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: opacity .15s; margin-top: .5rem; }
    .btn-primary:hover { opacity: .9; }
    .alert-error { background: #2d1515; border: 1px solid #7f1d1d; border-radius: 8px; padding: 10px 14px; color: #fca5a5; font-size: .82rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="brand">
      <div class="brand-icon"><i class="bi bi-shield-lock"></i></div>
      <div class="brand-name">Configuración inicial</div>
      <div class="brand-sub">Primer acceso al sistema</div>
    </div>

    <div class="notice">
      <i class="bi bi-info-circle-fill" style="flex-shrink:0;margin-top:1px"></i>
      <div>Creá el <strong>usuario administrador</strong>. Este usuario tendrá acceso total al sistema y podrá crear otros usuarios con permisos limitados.</div>
    </div>

    {% if error %}
    <div class="alert-error"><i class="bi bi-exclamation-triangle-fill"></i> {{ error }}</div>
    {% endif %}

    <form method="POST" action="/setup" id="setupForm">
      <div class="form-group">
        <label class="form-label" for="username">Nombre de usuario admin</label>
        <input type="text" id="username" name="username" class="form-control"
               placeholder="ej: admin" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña maestra</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="Mínimo 6 caracteres" required minlength="6">
        <div class="hint">Guardala en un lugar seguro — no se puede recuperar.</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password2">Confirmar contraseña</label>
        <input type="password" id="password2" name="password2" class="form-control"
               placeholder="Repetí la contraseña" required>
      </div>
      <button type="submit" class="btn-primary" id="btnSetup">
        Crear cuenta admin y entrar
      </button>
    </form>
  </div>
  <script>
    document.getElementById('setupForm').addEventListener('submit', function(e) {
      const p1 = document.getElementById('password').value;
      const p2 = document.getElementById('password2').value;
      if (p1 !== p2) { e.preventDefault(); alert('Las contraseñas no coinciden.'); return; }
      const btn = document.getElementById('btnSetup');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creando...';
    });
  </script>
</body>
</html>
